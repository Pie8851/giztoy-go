name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  linux:
    name: Linux ${{ matrix.arch }} Release Binary
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 60
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-24.04
          - arch: arm64
            runner: ubuntu-24.04-arm
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          lfs: true

      - name: Ensure Git LFS assets are available
        run: git lfs pull

      - name: Initialize nanopb submodule
        run: git submodule update --init --depth=1 third_party/nanopb/upstream

      - name: Build gizclaw Linux ${{ matrix.arch }} binary
        env:
          PLATFORM: linux/${{ matrix.arch }}
        run: ./build/build-linux.sh

      - name: Verify release binary on Ubuntu 24.04
        run: |
          file .tmp/deploy/gizclaw-linux-${{ matrix.arch }}
          docker run --rm --platform linux/${{ matrix.arch }} \
            -v "$PWD/.tmp/deploy:/out:ro" \
            ubuntu:24.04 \
            sh -lc 'ldd /out/gizclaw-linux-${{ matrix.arch }} && /out/gizclaw-linux-${{ matrix.arch }} --help >/dev/null'

      - name: Upload workflow artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: gizclaw-linux-${{ matrix.arch }}
          path: .tmp/deploy/gizclaw-linux-${{ matrix.arch }}
          if-no-files-found: error

  darwin:
    name: Darwin arm64 Release Binary
    runs-on: macos-latest
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          lfs: true

      - name: Ensure Git LFS assets are available
        run: git lfs pull

      - name: Initialize nanopb submodule
        run: git submodule update --init --depth=1 third_party/nanopb/upstream

      - name: Verify arm64 macOS runner
        run: test "$(uname -m)" = "arm64"

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff
        with:
          go-version-file: go.mod
          cache: true

      - name: Install UI dependencies
        run: npm ci

      - name: Build gizclaw Darwin arm64 binary
        env:
          CGO_ENABLED: "1"
          GOOS: darwin
          GOARCH: arm64
        run: |
          mkdir -p .tmp/deploy
          go build -trimpath -o .tmp/deploy/gizclaw-darwin-arm64 ./cmd/gizclaw

      - name: Verify release binary on macOS
        run: |
          file .tmp/deploy/gizclaw-darwin-arm64
          .tmp/deploy/gizclaw-darwin-arm64 --help >/dev/null

      - name: Upload workflow artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: gizclaw-darwin-arm64
          path: .tmp/deploy/gizclaw-darwin-arm64
          if-no-files-found: error

  publish:
    name: Publish Release
    needs:
      - linux
      - darwin
    runs-on: ubuntu-24.04
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          path: .tmp/release

      - name: Publish GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          short_sha="${GITHUB_SHA::7}"
          tag="main-latest"
          assets=(
            ".tmp/release/gizclaw-linux-amd64/gizclaw-linux-amd64#gizclaw-linux-amd64" \
            ".tmp/release/gizclaw-linux-arm64/gizclaw-linux-arm64#gizclaw-linux-arm64" \
            ".tmp/release/gizclaw-darwin-arm64/gizclaw-darwin-arm64#gizclaw-darwin-arm64"
          )

          if gh release view "$tag" >/dev/null 2>&1; then
            gh release delete "$tag" --yes --cleanup-tag
          fi

          gh release create "$tag" "${assets[@]}" \
            --target "$GITHUB_SHA" \
            --title "main latest ${short_sha}" \
            --notes "Automated release for ${GITHUB_SHA}."

      - name: Prune legacy automated releases
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          mapfile -t old_tags < <(
            gh release list --limit 100 --order desc --json tagName \
              --jq '.[] | select(.tagName | startswith("main-build-")) | .tagName'
          )

          for tag in "${old_tags[@]}"; do
            gh release delete "$tag" --yes --cleanup-tag
          done
