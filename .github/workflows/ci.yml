name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Go Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
    env:
      CGO_ENABLED: "1"
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          lfs: true

      - name: Ensure Git LFS assets are available
        run: git lfs pull

      - name: Initialize nanopb submodule
        run: git submodule update --init --depth=1 third_party/nanopb/upstream

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020
        with:
          node-version: 24
          cache: npm

      - name: Download modules
        run: go mod download

      - name: Install UI dependencies
        run: npm ci

      - name: Verify root module is tidy
        run: go mod tidy -diff

      - name: Run scoped vet checks
        run: go vet ./pkgs/gizclaw/services/runtime/peerroute ./sdk/c/gizclaw/cgobackend

      - name: Run C bridge checkptr tests
        run: go test -gcflags=all=-d=checkptr=2 ./sdk/c/gizclaw/cgobackend -count=1

      - name: Run tests
        env:
          GOFLAGS: -mod=readonly
        run: go test -count=1 ./...

  postgres:
    name: PostgreSQL Integration
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: gizclaw
          POSTGRES_PASSWORD: gizclaw
          POSTGRES_DB: gizclaw_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U gizclaw -d gizclaw_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      GIZCLAW_TEST_POSTGRES_DSN: postgres://gizclaw:gizclaw@127.0.0.1:5432/gizclaw_test?sslmode=disable
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          lfs: true

      - name: Ensure Git LFS assets are available
        run: git lfs pull

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff
        with:
          go-version-file: go.mod
          cache: true

      - name: Download modules
        run: go mod download

      - name: Require PostgreSQL test DSN
        run: test -n "$GIZCLAW_TEST_POSTGRES_DSN"

      - name: Run PostgreSQL integration tests
        env:
          GOFLAGS: -mod=readonly
        run: >-
          go test -count=1 -p 1
          ./cmd/internal/storage
          ./cmd/internal/stores
          ./cmd/internal/server
          ./pkgs/gizclaw/services/system/acl
          ./pkgs/gizclaw/services/gameplay

  nested-go-modules:
    name: Nested Go Modules
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          lfs: true

      - name: Ensure Git LFS assets are available
        run: git lfs pull

      - name: Install Wails Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --no-install-recommends -y \
            libgtk-3-dev \
            libayatana-appindicator3-dev

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: |
            go.sum
            **/go.sum

      - name: Test every nested Go module
        shell: bash
        run: |
          while IFS= read -r module; do
            directory="$(dirname "$module")"
            echo "::group::$directory"
            (
              cd "$directory"
              go mod tidy -diff
              GOFLAGS=-mod=readonly go test -count=1 ./...
            )
            echo "::endgroup::"
          done < <(
            find . -mindepth 2 -name go.mod \
              -not -path './.git/*' \
              -not -path './third_party/*' \
              -not -path './node_modules/*' \
              | sort
          )

  race:
    name: Go Race Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    env:
      CGO_ENABLED: "1"
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          lfs: true

      - name: Ensure Git LFS assets are available
        run: git lfs pull

      - name: Initialize nanopb submodule
        run: git submodule update --init --depth=1 third_party/nanopb/upstream

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff
        with:
          go-version-file: go.mod
          cache: true

      - name: Run root module race tests
        run: go test -race -count=1 ./...

  javascript:
    name: JavaScript And Guides
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: |
            package-lock.json
            guides/package-lock.json

      - name: Install workspace dependencies
        run: npm ci

      - name: Test maintained workspaces
        run: npm test --workspaces --if-present

      - name: Build Wails frontend
        run: npm --prefix apps/wails/frontend run build

      - name: Install guide dependencies
        run: npm --prefix guides ci

      - name: Build guides
        run: npm --prefix guides run build:site

  flutter:
    name: Flutter Test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          lfs: true

      - name: Ensure Git LFS assets are available
        run: git lfs pull

      - name: Set up Flutter
        uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2
        with:
          flutter-version: "3.38.1"
          channel: stable
          cache: true

      - name: Install SDK dependencies
        working-directory: sdk/flutter/gizclaw
        run: flutter pub get

      - name: Analyze SDK
        working-directory: sdk/flutter/gizclaw
        run: flutter analyze

      - name: Test SDK
        working-directory: sdk/flutter/gizclaw
        run: flutter test

      - name: Install app dependencies
        working-directory: apps/gizclaw-app
        run: flutter pub get

      - name: Analyze app
        working-directory: apps/gizclaw-app
        run: flutter analyze

      - name: Test app
        working-directory: apps/gizclaw-app
        run: flutter test
