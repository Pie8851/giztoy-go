---
apiVersion: gizclaw.admin/v1alpha1
kind: RuntimeProfile
metadata:
  name: default
spec:
  workflows:
    system:
      friend_chatroom: chatroom
      group_chatroom: chatroom
      pet: pet-care
    collections:
      assistants:
        doubao-realtime:
          resource_id: doubao-realtime-conversation
          i18n:
            en: {display_name: Doubao Assistant}
            zh-CN: {display_name: 豆包助手}
        general-assistant:
          resource_id: flowcraft-chat-assistant
          i18n:
            en: {display_name: Chat Assistant}
            zh-CN: {display_name: 聊天助手}
      translates:
        translate-zh-en-auto:
          resource_id: ast-translate-zh-en-auto
          i18n:
            en: {display_name: Chinese and English}
            zh-CN: {display_name: 中英翻译}
        translate-zh-ja:
          resource_id: ast-translate-zh-ja
          i18n:
            en: {display_name: Chinese and Japanese}
            zh-CN: {display_name: 中日翻译}
        translate-zh-ko:
          resource_id: ast-translate-zh-ko
          i18n:
            en: {display_name: Chinese and Korean}
            zh-CN: {display_name: 中韩翻译}
        translate-zh-es:
          resource_id: ast-translate-zh-es
          i18n:
            en: {display_name: Chinese and Spanish}
            zh-CN: {display_name: 中西翻译}
      raids:
        murder-mystery:
          resource_id: flowcraft-murder-mystery
          i18n:
            en: {display_name: Murder Mystery}
            zh-CN: {display_name: 雨夜惊魂}
      story-teller:
        journey:
          resource_id: flowcraft-journey-guide
          i18n:
            en: {display_name: Journey to the West}
            zh-CN: {display_name: 西游记}
      role-play: {}
  resources:
    models:
      asr:
        resource_id: volc-bigasr-sauc
        i18n:
          en: {display_name: Speech Recognition}
          zh-CN: {display_name: 语音识别}
      realtime:
        resource_id: doubao-realtime-dialog
        i18n:
          en: {display_name: Realtime Conversation}
          zh-CN: {display_name: 实时对话}
      translation:
        resource_id: volc-ast-translate
        i18n:
          en: {display_name: Translation Model}
          zh-CN: {display_name: 翻译模型}
      chat:
        resource_id: doubao-seed-2-0-lite
        i18n:
          en: {display_name: Chat}
          zh-CN: {display_name: 对话}
      extraction:
        resource_id: deepseek-v4-flash
        i18n:
          en: {display_name: Extraction}
          zh-CN: {display_name: 信息提取}
      embedding:
        resource_id: qwen3.7-text-embedding
        i18n:
          en: {display_name: Text Embedding}
          zh-CN: {display_name: 文本向量}
      pet-chat:
        resource_id: doubao-seed-2-0-lite
        i18n:
          en: {display_name: Pet Chat}
          zh-CN: {display_name: 宠物对话}
      pet-extract:
        resource_id: deepseek-v4-flash
        i18n:
          en: {display_name: Pet Memory Extraction}
          zh-CN: {display_name: 宠物记忆提取}
      pet-asr:
        resource_id: volc-bigasr-sauc
        i18n:
          en: {display_name: Pet Speech Recognition}
          zh-CN: {display_name: 宠物语音识别}
    voices:
      doubao-assistant:
        resource_id: volc-tenant:volc-main:zh_female_vv_jupiter_bigtts
        i18n:
          en: {display_name: Doubao Assistant}
          zh-CN: {display_name: 豆包助手}
      assistant-voice:
        resource_id: volc-tenant:volc-main:zh_female_qingxinnvsheng_mars_bigtts
        i18n:
          en: {display_name: General Assistant}
          zh-CN: {display_name: 通用助手}
      cute-pet:
        resource_id: volc-tenant:volc-main:zh_male_naiqimengwa_mars_bigtts
        i18n:
          en: {display_name: Cute Pet}
          zh-CN: {display_name: 奶气萌宠}
      translator:
        resource_id: volc-tenant:volc-main:zh_female_sophie_conversation_wvae_bigtts
        i18n:
          en: {display_name: Translator}
          zh-CN: {display_name: 翻译员}
      narrator:
        resource_id: volc-tenant:volc-main:zh_female_shaoergushi_mars_bigtts
        i18n:
          en: {display_name: Narrator}
          zh-CN: {display_name: 旁白}
      game-master:
        resource_id: volc-tenant:volc-main:zh_male_changtianyi_mars_bigtts
        i18n:
          en: {display_name: Game Master}
          zh-CN: {display_name: 游戏主持人}
      detective:
        resource_id: volc-tenant:volc-main:ICL_zh_male_lengjungaozhi_tob
        i18n:
          en: {display_name: Detective}
          zh-CN: {display_name: 侦探}
      police-officer:
        resource_id: volc-tenant:volc-main:ICL_zh_male_zhengzhiqingnian_tob
        i18n:
          en: {display_name: Police Officer}
          zh-CN: {display_name: 警察}
      sun-wukong:
        resource_id: volc-tenant:volc-main:zh_male_sunwukong_mars_bigtts
        i18n:
          en: {display_name: Sun Wukong}
          zh-CN: {display_name: 孙悟空}
      tang-sanzang:
        resource_id: volc-tenant:volc-main:zh_male_tangseng_mars_bigtts
        i18n:
          en: {display_name: Tang Sanzang}
          zh-CN: {display_name: 唐僧}
      zhu-bajie:
        resource_id: volc-tenant:volc-main:zh_male_zhubajie_mars_bigtts
        i18n:
          en: {display_name: Zhu Bajie}
          zh-CN: {display_name: 猪八戒}
    pet_defs:
      bsod: {resource_id: petdef-bsod, i18n: {en: {display_name: BSOD}, zh-CN: {display_name: 蓝屏}}}
      codex: {resource_id: petdef-codex, i18n: {en: {display_name: Codex}, zh-CN: {display_name: Codex}}}
      dewey: {resource_id: petdef-dewey, i18n: {en: {display_name: Dewey}, zh-CN: {display_name: 杜威}}}
      fireball: {resource_id: petdef-fireball, i18n: {en: {display_name: Fireball}, zh-CN: {display_name: 火球}}}
      hoots: {resource_id: petdef-hoots, i18n: {en: {display_name: Hoots}, zh-CN: {display_name: 呼呼}}}
      null-signal: {resource_id: petdef-null-signal, i18n: {en: {display_name: Null Signal}, zh-CN: {display_name: 空信号}}}
      rocky: {resource_id: petdef-rocky, i18n: {en: {display_name: Rocky}, zh-CN: {display_name: 洛奇}}}
      seedy: {resource_id: petdef-seedy, i18n: {en: {display_name: Seedy}, zh-CN: {display_name: 种子}}}
      stacky: {resource_id: petdef-stacky, i18n: {en: {display_name: Stacky}, zh-CN: {display_name: 栈栈}}}
