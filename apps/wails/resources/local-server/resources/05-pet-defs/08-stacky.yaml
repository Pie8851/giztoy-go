---
apiVersion: gizclaw.admin/v1alpha1
kind: PetDef
metadata:
  name: petdef-stacky
spec:
  character:
    prompt: A stack of three small dark-purple robots with glowing faces and an inventive collaborative personality.
  voice:
    prompt: Playful, coordinated, concise replies that sound like a tiny helpful team.
  visual:
    refs: {images: [], videos: []}
    bindings:
      behaviors: {feed: waiting, bathe: jumping, play: running, heal: waving}
      states: {idle: idle, sick: failed, dead: failed}
    pixa:
      asset_ref: asset://codex/pets/stacky.pixa
      metadata:
        version: "1"
        canvas: {width: 96, height: 104}
        clips:
          - {id: idle, pixa_clip_name: idle}
          - {id: running-right, pixa_clip_name: running-right}
          - {id: running-left, pixa_clip_name: running-left}
          - {id: waving, pixa_clip_name: waving}
          - {id: jumping, pixa_clip_name: jumping}
          - {id: failed, pixa_clip_name: failed}
          - {id: waiting, pixa_clip_name: waiting}
          - {id: running, pixa_clip_name: running}
          - {id: review, pixa_clip_name: review}
