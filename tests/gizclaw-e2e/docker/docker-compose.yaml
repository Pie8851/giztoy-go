services:
  server:
    build:
      context: ../../..
      dockerfile: tests/gizclaw-e2e/docker/Dockerfile.server
      args:
        BASE_IMAGE: ${GIZCLAW_E2E_DOCKER_BASE_IMAGE:-gizclaw-go:linux-amd64-cn-base}
    environment:
      GIZCLAW_E2E_CONFIG_HOME: /src/tests/gizclaw-e2e/testdata/cmd-config-home
      GIZCLAW_E2E_SERVER_ENDPOINT: ${GIZCLAW_E2E_SERVER_ENDPOINT:?set by docker-compose-up.sh}
      GIZCLAW_E2E_TURN_ENDPOINT: ${GIZCLAW_E2E_TURN_ENDPOINT:?set by docker-compose-up.sh}
      GIZCLAW_E2E_TURN_REALM: ${GIZCLAW_E2E_TURN_REALM:?set by docker-compose-up.sh}
      GIZCLAW_E2E_TURN_USERNAME: ${GIZCLAW_E2E_TURN_USERNAME:?set by docker-compose-up.sh}
      GIZCLAW_E2E_TURN_CREDENTIAL: ${GIZCLAW_E2E_TURN_CREDENTIAL:?set by docker-compose-up.sh}
      GIZCLAW_E2E_SKIP_PROVIDER_SYNC: ${GIZCLAW_E2E_SKIP_PROVIDER_SYNC:-0}
    volumes:
      - type: bind
        source: ../.env
        target: /src/tests/gizclaw-e2e/.env
        read_only: true
        bind:
          create_host_path: false
    healthcheck:
      test: ["CMD-SHELL", "test -f /tmp/gizclaw-e2e-server-http-ready && curl -fsS http://127.0.0.1:9820/server-info >/dev/null"]
      interval: 2s
      timeout: 1s
      retries: 60
      start_period: 300s
    ports:
      - "${GIZCLAW_E2E_DOCKER_ADMIN_BIND:-127.0.0.1}:${GIZCLAW_E2E_DOCKER_ADMIN_PORT:?set by docker-compose-up.sh}:9820/tcp"

  edge:
    build:
      context: ../../..
      dockerfile: tests/gizclaw-e2e/docker/Dockerfile.server
      args:
        BASE_IMAGE: ${GIZCLAW_E2E_DOCKER_BASE_IMAGE:-gizclaw-go:linux-amd64-cn-base}
    entrypoint: ["/src/tests/gizclaw-e2e/docker/entrypoint-edge.sh"]
    depends_on:
      server:
        condition: service_healthy
    environment:
      GIZCLAW_E2E_SERVER_ENDPOINT: ${GIZCLAW_E2E_SERVER_ENDPOINT:?set by docker-compose-up.sh}
      GIZCLAW_E2E_EDGE_ENDPOINT: ${GIZCLAW_E2E_EDGE_ENDPOINT:?set by docker-compose-up.sh}
      GIZCLAW_E2E_TURN_ENDPOINT: ${GIZCLAW_E2E_TURN_ENDPOINT:?set by docker-compose-up.sh}
      GIZCLAW_E2E_TURN_RELAY_ADDRESS: ${GIZCLAW_E2E_TURN_RELAY_ADDRESS:?set by docker-compose-up.sh}
      GIZCLAW_E2E_TURN_REALM: ${GIZCLAW_E2E_TURN_REALM:?set by docker-compose-up.sh}
      GIZCLAW_E2E_TURN_USERNAME: ${GIZCLAW_E2E_TURN_USERNAME:?set by docker-compose-up.sh}
      GIZCLAW_E2E_TURN_CREDENTIAL: ${GIZCLAW_E2E_TURN_CREDENTIAL:?set by docker-compose-up.sh}
      GIZCLAW_E2E_TURN_RELAY_MIN_PORT: ${GIZCLAW_E2E_TURN_RELAY_MIN_PORT:?set by docker-compose-up.sh}
      GIZCLAW_E2E_TURN_RELAY_MAX_PORT: ${GIZCLAW_E2E_TURN_RELAY_MAX_PORT:?set by docker-compose-up.sh}
      GIZCLAW_E2E_EDGE_UPSTREAM_ENDPOINT: http://server:9820
    ports:
      - "${GIZCLAW_E2E_DOCKER_SERVER_BIND:-0.0.0.0}:${GIZCLAW_E2E_DOCKER_EDGE_PORT:?set by docker-compose-up.sh}:9821/tcp"
      - "${GIZCLAW_E2E_DOCKER_SERVER_BIND:-0.0.0.0}:${GIZCLAW_E2E_DOCKER_TURN_PORT:?set by docker-compose-up.sh}:9823/udp"
      - "${GIZCLAW_E2E_DOCKER_SERVER_BIND:-0.0.0.0}:${GIZCLAW_E2E_TURN_RELAY_MIN_PORT:?set by docker-compose-up.sh}-${GIZCLAW_E2E_TURN_RELAY_MAX_PORT:?set by docker-compose-up.sh}:${GIZCLAW_E2E_TURN_RELAY_MIN_PORT:?set by docker-compose-up.sh}-${GIZCLAW_E2E_TURN_RELAY_MAX_PORT:?set by docker-compose-up.sh}/udp"
    volumes:
      - type: bind
        source: ../.env
        target: /src/tests/gizclaw-e2e/.env
        read_only: true
        bind:
          create_host_path: false
    healthcheck:
      test: ["CMD-SHELL", "test -f /tmp/gizclaw-e2e-edge-ready && curl -fsS http://127.0.0.1:9821/server-info >/dev/null"]
      interval: 2s
      timeout: 1s
      retries: 60
      start_period: 300s

  desktop:
    build:
      context: ../../..
      dockerfile: tests/gizclaw-e2e/docker/Dockerfile.desktop
      args:
        BASE_IMAGE: ${GIZCLAW_E2E_DOCKER_BASE_IMAGE:-gizclaw-go:linux-amd64-cn-base}
    depends_on:
      edge:
        condition: service_healthy
    ports:
      - "${GIZCLAW_E2E_DOCKER_DESKTOP_BIND:-0.0.0.0}::4191/tcp"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:4191/ >/dev/null"]
      interval: 2s
      timeout: 1s
      retries: 60
      start_period: 5s
