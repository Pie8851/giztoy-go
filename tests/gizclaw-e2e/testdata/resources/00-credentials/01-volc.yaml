---
apiVersion: gizclaw.admin/v1alpha1
kind: Credential
metadata:
  name: volc-main-credential
spec:
  provider: volc
  description: Volc/Doubao speech credential
  body:
    app_id: "${GIZCLAW_E2E_DOUBAO_APP_ID}"
    api_key: "${GIZCLAW_E2E_DOUBAO_API_KEY}"
    search_api_key: "${GIZCLAW_E2E_DOUBAO_SEARCH_API_KEY}"
    openapi_access_key_id: "${GIZCLAW_E2E_VOLC_OPENAPI_ACCESS_KEY_ID}"
    openapi_access_key: "${GIZCLAW_E2E_VOLC_OPENAPI_ACCESS_KEY}"
