---
apiVersion: gizclaw.admin/v1alpha1
kind: Workflow
metadata:
  name: flowcraft-route-matcher
i18n:
  default_locale: en
  en:
    name: Smart Intent Router
    description: Match spoken requests to conversation, music, volume, stop, or web search actions.
  zh-CN:
    name: 智能意图路由
    description: 将语音请求匹配到对话、音乐、音量、停止或网页搜索操作。
spec:
  driver: flowcraft
  flowcraft:
    agent:
      description: Routes by persisted route state first, then PALR-style text format
        and JS extraction.
      graph:
        edges:
        - from: start
          to: state_route
        - from: state_route
          to: route_fork
        - from: chat_buffer
          to: join_select
        - from: route_fork
          to: route_branch
        - condition: needs_format == false
          from: route_branch
          to: prepare_function_prompt
        - condition: needs_format == true
          from: route_branch
          to: format_intent
        - from: format_intent
          to: extract_formatch
        - condition: has_function_intent == true
          from: extract_formatch
          to: prepare_function_prompt
        - condition: has_function_intent == false
          from: extract_formatch
          to: chat_buffer
        - condition: function_route == "play_music"
          from: prepare_function_prompt
          to: function_play_music
        - condition: function_route == "adjust_device_volume"
          from: prepare_function_prompt
          to: function_adjust_device_volume
        - condition: function_route == "stop"
          from: prepare_function_prompt
          to: function_stop
        - condition: function_route == "web_search"
          from: prepare_function_prompt
          to: function_web_search
        - from: function_play_music
          to: clear_completed_route
        - from: function_adjust_device_volume
          to: clear_completed_route
        - from: function_stop
          to: clear_completed_route
        - from: function_web_search
          to: clear_completed_route
        - condition: has_next_route == true
          from: clear_completed_route
          to: prepare_function_prompt
        - from: clear_completed_route
          to: join_select
        - from: join_select
          to: __end__
        entry: start
        name: match-route
        nodes:
        - id: start
          type: passthrough
        - id: route_fork
          type: passthrough
        - id: route_branch
          type: passthrough
        - config:
            max_tokens: 192
            model: generate_model
            output_key: chat_result
            system_prompt: |
              You are the normal chat branch of a tool assistant.
              Use the conversation history already present in the main channel.
              Reply in natural spoken Chinese.
              Keep the reply to one or two short sentences.
              Ask at most one concrete follow-up question.
              If the user asks to chat about a story, character, object, or situation, respond as normal conversation. Do not pretend to be a long-form storyteller.
              Do not mention routing, tools, function nodes, hidden branch decisions, or that another branch is running.
              Do not use markdown, bullet lists, labels, stage directions, emoji, emoticons, or decorative symbols.
          id: chat_buffer
          publish: true
          type: llm
        - config:
            source: |
              function latestUserText() {
                const msgs = board.channel(board.MAIN_CHANNEL) || [];
                for (let i = msgs.length - 1; i >= 0; i--) {
                  const msg = msgs[i] || {};
                  if (msg.role !== "user") continue;
                  if (typeof msg.content === "string" && msg.content.trim()) return msg.content.trim();
                  const parts = Array.isArray(msg.parts) ? msg.parts : [];
                  const text = parts.map(function(part) {
                    return part && part.type === "text" && typeof part.text === "string" ? part.text : "";
                  }).join("").trim();
                  if (text) return text;
                }
                return "";
              }

              const ws = board.getVar("workspace_state") || {};
              const activeRoute = board.getVar("active_route") || ws.active_route || "";
              const activeArgs = board.getVar("active_args") || ws.active_args || {};
              const pendingRoutes = board.getVar("pending_routes") || ws.pending_routes || [];

              if (activeRoute) {
                const args = Object.assign({}, activeArgs || {});
                const latest = latestUserText();
                if ((activeRoute === "play_music" || activeRoute === "play_song" || activeRoute === "sing") && !args.title && latest) {
                  args.title = latest;
                }
                board.setVar("route_source", "state");
                board.setVar("matched_intent", activeRoute);
                board.setVar("matched_args", args);
                board.setVar("matched_args_json", JSON.stringify(args || {}));
                board.setVar("function_route", activeRoute);
                board.setVar("pending_routes", Array.isArray(pendingRoutes) ? pendingRoutes : []);
                board.setVar("pending_routes_json", JSON.stringify(Array.isArray(pendingRoutes) ? pendingRoutes : []));
                board.setVar("has_next_route", false);
                board.setVar("has_function_intent", true);
                board.setVar("needs_format", false);
              } else {
                board.setVar("route_source", "format");
                board.setVar("matched_intent", "");
                board.setVar("matched_args", {});
                board.setVar("matched_args_json", "{}");
                board.setVar("function_route", "");
                board.setVar("pending_routes", []);
                board.setVar("pending_routes_json", "[]");
                board.setVar("has_next_route", false);
                board.setVar("has_function_intent", false);
                board.setVar("needs_format", true);
                board.setVar("tmp_main_channel_before_format", board.channel(board.MAIN_CHANNEL));
                board.setChannel("route_format_channel", [{
                  role: "user",
                  parts: [{ type: "text", text: latestUserText() }],
                }]);
              }
          id: state_route
          type: script
        - config:
            max_tokens: 256
            messages_channel: route_format_channel
            model: generate_model
            output_key: formatch_text
            system_prompt: |
              You are a fast intent formatter. Format the latest user text into supported route pattern lines.

              Rules:
              - Output only pattern lines. No explanation.
              - If no supported route pattern matches, output: nothing
              - One supported route pattern per line.
              - If the user gives multiple commands, output one line per supported route command in the original order.
              - Ignore unsupported commands unless a supported route command is also present.
              - Treat story requests, opinions, personal conversation, and ordinary explanations as unsupported chat, not as a route.
              - Match play_music, adjust_device_volume, and stop only for direct requests for the assistant to do something now.
              - Match web_search only when the user asks for public factual information that likely needs current, recent, external, online, news, weather, price, schedule, release, ranking, policy, or other changing information.
              - Do not use web_search for casual opinions, memory recall, personal preference, local workspace state, storytelling, or general knowledge that does not need fresh public information.
              - Do not match informational questions, opinions, mentions, or discussion about songs, music, stories, or devices as play_music.
              - Phrases like "听说", "知道", "介绍一下", "是什么", "好听吗", or a question mark do not mean play_music unless the same sentence also explicitly asks to play, sing, listen to, or start music.
              - Songs have lyrics. Music has no lyrics.

              Patterns:
              - 播放歌曲 -> play_song
              - 我想听[歌曲名] -> play_song: title=[歌曲名]
              - 我想听[歌手]的[歌曲名] -> play_song: artist=[歌手], title=[歌曲名]
              - 给我唱首歌 -> sing
              - 唱一首[歌曲名] -> sing: title=[歌曲名]
              - 播放音乐 -> play_music
              - 我想听音乐 -> play_music
              - 我要听歌 -> play_music
              - 我想听[乐曲名] -> play_music: title=[乐曲名]
              - 我想听[音乐家]的[乐曲名] -> play_music: artist=[音乐家], title=[乐曲名]
              - 调整音量到[百分比] -> adjust_device_volume: pct=[百分比]
              - 大声点 -> adjust_device_volume: delta=10
              - 小声点 -> adjust_device_volume: delta=-10
              - 停止播放 -> stop_playing
              - 不聊了 -> stop_chat
              - 查询[问题] -> web_search: query=[问题]
              - 搜一下[问题] -> web_search: query=[问题]
              - [最新/今天/现在/最近/新闻/天气/价格/日程/发布/版本/政策] -> web_search: query=[完整问题]

              Examples:
              User: 今天天气怎么样
              web_search: query=今天天气怎么样

              User: 你继续讲刚才那个故事
              nothing

              User: 给我讲个恐龙的故事
              nothing

              User: 我今天听说卡农很好听，你知道这首曲子吗？
              nothing

              User: 今天 OpenAI 有什么新消息？
              web_search: query=今天 OpenAI 有什么新消息？

              User: 搜一下豆包 2.0 lite 的上下文长度
              web_search: query=豆包 2.0 lite 的上下文长度

              User: 我想听卡农，然后把音量调到30%
              play_music: title=卡农
              adjust_device_volume: pct=30

              User: 我要听歌，然后大声点
              play_music
              adjust_device_volume: delta=10

              User: 我想听卡农，然后把音量调到30%，最后停止播放
              play_music: title=卡农
              adjust_device_volume: pct=30
              stop_playing

              User: 给我讲个恐龙的故事，然后小声点
              adjust_device_volume: delta=-10

              User: 帮我订机票，然后大声点
              adjust_device_volume: delta=10
            temperature: 0
          id: format_intent
          publish: false
          type: llm
        - config:
            source: |
              const raw = String(board.getVar("formatch_text") || "").trim();
              const lines = raw.split(/\r?\n/).map(function(line) {
                return line.trim();
              }).filter(Boolean);

              function parseArgs(text) {
                const args = {};
                text.split(",").forEach(function(part) {
                  const idx = part.indexOf("=");
                  if (idx < 0) return;
                  const key = part.slice(0, idx).trim();
                  const value = part.slice(idx + 1).trim();
                  if (key) args[key] = value;
                });
                return args;
              }

              const allowed = {
                play_song: true,
                sing: true,
                play_music: true,
                adjust_device_volume: true,
                stop_playing: true,
                stop_chat: true,
                web_search: true,
              };

              function routeFromIntent(intent) {
                let functionRoute = intent;
                if (intent === "play_song" || intent === "sing") functionRoute = "play_music";
                if (intent === "stop_playing" || intent === "stop_chat") functionRoute = "stop";
                return functionRoute;
              }

              function parseRoute(line) {
                if (line === "nothing") return null;
                const arrowIdx = line.indexOf("->");
                const normalized = arrowIdx >= 0 ? line.slice(arrowIdx + 2).trim() : line;
                const idx = normalized.indexOf(":");
                let intent = "";
                let args = {};
                if (idx < 0) {
                  intent = normalized.trim();
                  args = {};
                } else {
                  intent = normalized.slice(0, idx).trim();
                  args = parseArgs(normalized.slice(idx + 1));
                }
                if (!allowed[intent]) return null;
                return {
                  intent: intent,
                  route: routeFromIntent(intent),
                  args: args,
                };
              }

              const routes = [];
              for (const line of lines) {
                const parsed = parseRoute(line);
                if (parsed) routes.push(parsed);
              }
              if (routes.length === 0) {
                board.setVar("route_source", "chat");
                board.setVar("has_function_intent", false);
                board.setVar("matched_intent", "");
                board.setVar("matched_args", {});
                board.setVar("matched_args_json", "{}");
                board.setVar("function_route", "");
                board.setVar("pending_routes", []);
                board.setVar("pending_routes_json", "[]");
                board.setVar("has_next_route", false);
                board.setVar("needs_format", false);
              } else {
                const current = routes[0];
                const pending = routes.slice(1);

                board.setVar("route_source", "format");
                board.setVar("has_function_intent", true);
                board.setVar("matched_intent", current.intent);
                board.setVar("matched_args", current.args || {});
                board.setVar("matched_args_json", JSON.stringify(current.args || {}));
                board.setVar("function_route", current.route);
                board.setVar("pending_routes", pending);
                board.setVar("pending_routes_json", JSON.stringify(pending));
                board.setVar("has_next_route", pending.length > 0);
              }

              function setRestoredMainChannel(messages) {
                const restored = messages.map(function(msg) {
                  const out = { role: msg && msg.role ? msg.role : "user", parts: [] };
                  if (msg && typeof msg.content === "string" && msg.content) {
                    out.parts.push({ type: "text", text: msg.content });
                  }
                  const parts = Array.isArray(msg && msg.parts) ? msg.parts : [];
                  for (const part of parts) {
                    if ((part.type === "text" || part.type === "text/xml") && typeof part.text === "string") {
                      out.parts.push({ type: "text", text: part.text });
                    }
                  }
                  if (out.parts.length === 0) {
                    out.parts.push({ type: "text", text: "" });
                  }
                  return out;
                });
                board.setChannel(board.MAIN_CHANNEL, restored);
              }

              const originalMain = board.getVar("tmp_main_channel_before_format");
              if (Array.isArray(originalMain)) {
                setRestoredMainChannel(originalMain);
              }
          id: extract_formatch
          type: script
        - config:
            source: |
              function latestUserText() {
                const msgs = board.channel(board.MAIN_CHANNEL) || [];
                for (let i = msgs.length - 1; i >= 0; i--) {
                  const msg = msgs[i] || {};
                  if (msg.role !== "user") continue;
                  if (typeof msg.content === "string" && msg.content.trim()) return msg.content.trim();
                  const parts = Array.isArray(msg.parts) ? msg.parts : [];
                  const text = parts.map(function(part) {
                    return part && part.type === "text" && typeof part.text === "string" ? part.text : "";
                  }).join("").trim();
                  if (text) return text;
                }
                return "";
              }

              const intent = String(board.getVar("matched_intent") || "");
              const route = String(board.getVar("function_route") || intent || "");
              let args = board.getVar("matched_args") || {};
              const pending = Array.isArray(board.getVar("pending_routes")) ? board.getVar("pending_routes") : [];
              const latest = latestUserText();
              if (route === "web_search" && !args.query && latest) {
                args = Object.assign({}, args, { query: latest });
                board.setVar("matched_args", args);
              }
              const argsJSON = JSON.stringify(args || {});
              const pendingJSON = JSON.stringify(pending);
              board.setVar("matched_args_json", argsJSON);
              board.setVar("pending_routes_json", pendingJSON);

              const base = [
                "You are a function node in a routed assistant graph.",
                "Current route context:",
                "- intent: " + intent,
                "- route: " + route,
                "- matched_args_json: " + argsJSON,
                "- pending_routes_json: " + pendingJSON,
                "Use matched_args_json as the source of truth for the current function. Ignore earlier conversation, previous function output, and tool results if they conflict with this context.",
                "Complete only the current function. Do not mention or execute pending routes."
              ];
              const instructions = {
                play_music: [
                  "You are the play_music function node.",
                  "If title is present, first output one short user-facing Chinese sentence confirming the chosen music, then call play_music exactly once with title and optional artist.",
                  "If matched_args_json has no title, ask exactly one concise clarification question asking which song or music to play. Do not call any tool.",
                  "Never choose a song by guessing from earlier chat when title is missing.",
                  "Do not invent unsupported tool names."
                ],
                adjust_device_volume: [
                  "You are the adjust_device_volume function node.",
                  "First output one short user-facing Chinese sentence that says you are adjusting the volume.",
                  "Then call set_device_volume exactly once.",
                  "If pct is present, call set_device_volume with pct.",
                  "If delta is present, call set_device_volume with delta.",
                  "If no value is present, ask one concise clarification question and do not call any tool.",
                  "Do not invent unsupported tool names."
                ],
                stop: [
                  "You are the stop function node.",
                  "If intent is stop_playing, first output one short Chinese sentence, then call stop_playback exactly once.",
                  "If intent is stop_chat, output one short Chinese goodbye and do not call any tool.",
                  "Do not ask a clarification unless the user asks to stop something ambiguous.",
                  "Do not invent unsupported tool names."
                ],
                web_search: [
                  "You are the web_search node.",
                  "The selected model has provider-hosted web search enabled.",
                  "Use matched_args_json.query as the search question. If it is empty, use the latest user message.",
                  "Answer in natural spoken Chinese with only information relevant to the user's question.",
                  "Keep the answer concise: two to four short sentences.",
                  "Mention uncertainty briefly when the search result is incomplete or ambiguous.",
                  "Do not use markdown, bullet lists, labels, citations blocks, tool names, or hidden routing language."
                ]
              };
              const prompt = base.concat(instructions[route] || []).join("\n");
              board.setVar("function_prompt", prompt);
              board.setChannel("function_route_channel", [{
                role: "user",
                parts: [{ type: "text", text: route === "web_search" && args.query ? String(args.query) : latest }],
              }]);
          id: prepare_function_prompt
          type: script
        - config:
            max_tokens: 192
            messages_channel: function_route_channel
            model: generate_model
            output_key: function_result
            system_prompt: "${board.function_prompt}"
            tool_names:
            - play_music
          id: function_play_music
          publish: true
          type: llm
        - config:
            max_tokens: 128
            messages_channel: function_route_channel
            model: generate_model
            output_key: function_result
            system_prompt: "${board.function_prompt}"
            tool_names:
            - set_device_volume
          id: function_adjust_device_volume
          publish: true
          type: llm
        - config:
            max_tokens: 128
            messages_channel: function_route_channel
            model: generate_model
            output_key: function_result
            system_prompt: "${board.function_prompt}"
            tool_names:
            - stop_playback
          id: function_stop
          publish: true
          type: llm
        - config:
            max_tokens: 384
            messages_channel: function_route_channel
            model: generate_model
            output_key: function_result
            system_prompt: "${board.function_prompt}"
          id: function_web_search
          publish: true
          type: llm
        - config:
            source: |
              const intent = board.getVar("matched_intent") || "";
              const route = board.getVar("function_route") || intent;
              const args = board.getVar("matched_args") || {};
              const pending = Array.isArray(board.getVar("pending_routes")) ? board.getVar("pending_routes") : [];
              const missingTitle = route === "play_music" && !args.title;

              if (missingTitle) {
                board.setVar("active_route", route);
                board.setVar("active_args", args);
                board.setVar("pending_routes", pending);
                board.setVar("matched_args_json", JSON.stringify(args || {}));
                board.setVar("pending_routes_json", JSON.stringify(pending));
                board.setVar("has_next_route", false);
              } else if (pending.length > 0) {
                const next = pending[0] || {};
                const rest = pending.slice(1);
                board.setVar("route_source", "pending");
                board.setVar("matched_intent", next.intent || "");
                board.setVar("matched_args", next.args || {});
                board.setVar("matched_args_json", JSON.stringify(next.args || {}));
                board.setVar("function_route", next.route || "");
                board.setVar("active_route", "");
                board.setVar("active_args", {});
                board.setVar("pending_routes", rest);
                board.setVar("pending_routes_json", JSON.stringify(rest));
                board.setVar("has_next_route", true);
              } else {
                board.setVar("active_route", "");
                board.setVar("active_args", {});
                board.setVar("pending_routes", []);
                board.setVar("matched_intent", "");
                board.setVar("matched_args", {});
                board.setVar("matched_args_json", "{}");
                board.setVar("function_route", "");
                board.setVar("pending_routes_json", "[]");
                board.setVar("has_function_intent", false);
                board.setVar("has_next_route", false);
              }
          id: clear_completed_route
          type: script
        - config:
            source: 'board.setVar("joined", true);

'
          id: join_select
          type: script
      id: claw
      max_iterations: 16
      name: Match Route
      parallel:
        enabled: true
        max_branches: 4
        merge_strategy: last_wins
      tools:
      - description: Play a requested song, track, or piece of music.
        input_schema:
          properties:
            artist:
              description: Optional artist or composer name.
              type: string
            reason:
              description: Short reason inferred from the user request.
              type: string
            title:
              description: Song or music title to play.
              type: string
          required:
          - title
          type: object
        name: play_music
      - description: Set or adjust the current device volume.
        input_schema:
          properties:
            delta:
              description: Relative volume change, positive to increase and negative
                to decrease.
              type: number
            pct:
              description: Target volume percentage from 0 to 100.
              type: number
            reason:
              description: Short reason inferred from the user request.
              type: string
          type: object
        name: set_device_volume
      - description: Stop the current music or audio playback.
        input_schema:
          properties:
            reason:
              description: Short reason inferred from the user request.
              type: string
          type: object
        name: stop_playback
    conversation:
      context_id: flowcraft-route-matcher
      starts: self
    history:
      enabled: true
      kind: buffer
      max_messages: 20
    memory:
      embedding:
        enabled: false
      enabled: true
      extract:
        enabled: true
        mode: two_pass
        model: generate_model
        schema_name: match_route_memory
        system_prompt: |
          Extract durable memory for a function-routing assistant.

          Workspace state owns the deterministic active_route, active_args, and pending_routes fields. Memory only stores semantic continuity that helps a function node resume politely, ask for missing slots, and avoid repeating previous clarifying questions.
        temperature: 0
      layout:
        lanes:
        - description: Durable semantic context about an unfinished function route.
          extract: Capture the active function name, known slots, missing slots, and
            the exact next clarification if the function was not completed.
          kind: state
          name: function_route_state
          recall: Use this lane only after workspace_state has been checked; it is
            supporting context, not the source of deterministic routing.
        - description: User preferences for music, stories, language, and response
            style.
          extract: Capture stable user preferences that can help future function nodes
            choose defaults.
          kind: preference
          name: user_function_preferences
          recall: Use this lane to fill harmless defaults and personalize function
            responses.
      recall:
        enabled: true
        graph_enabled: true
        include_retired: false
        profiles:
          function_preferences:
            output: function_preferences
            query:
              kinds:
              - preference
              lanes:
              - user_function_preferences
              text: input
            render:
              header: 'Relevant function preferences:'
              item_prefix: "- "
              max_items: 4
            top_k: 4
          route_memory:
            output: route_memory
            query:
              kinds:
              - state
              lanes:
              - function_route_state
              text: input
            render:
              header: 'Relevant route memory:'
              item_prefix: "- "
              max_items: 4
            top_k: 4
      retrieval:
        backend: bbh
      scope:
        agent_id: match-route-agent
        runtime_id: match-route
        user_id: local
      write:
        mode: async_semantic
        save_conversation: true
        tier: general
    settings:
      generate_model: generate_model
    workspace:
      history_root: history
      memory_root: memory
      state_root: state
    voice_adapter:
      asr_model: volc-bigasr-sauc
      default_voice: volc-tenant:volc-main:zh_female_shaoergushi_mars_bigtts
      node_voices:
        chat_buffer: volc-tenant:volc-main:zh_female_shaoergushi_mars_bigtts
        function_adjust_device_volume: volc-tenant:volc-main:zh_female_shaoergushi_mars_bigtts
        function_play_music: volc-tenant:volc-main:zh_female_shaoergushi_mars_bigtts
        function_stop: volc-tenant:volc-main:zh_female_shaoergushi_mars_bigtts
        function_web_search: volc-tenant:volc-main:zh_female_shaoergushi_mars_bigtts
