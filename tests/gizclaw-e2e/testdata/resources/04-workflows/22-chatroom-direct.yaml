---
apiVersion: gizclaw.admin/v1alpha1
kind: Workflow
metadata:
  name: chatroom-direct
i18n:
  default_locale: en
  en:
    name: Direct Chat
    description: Exchange persistent one-to-one messages with a friend.
  zh-CN:
    name: 好友私聊
    description: 与好友进行持久的一对一消息交流。
spec:
  chatroom:
    history:
      ttl: 168h
  driver: chatroom
