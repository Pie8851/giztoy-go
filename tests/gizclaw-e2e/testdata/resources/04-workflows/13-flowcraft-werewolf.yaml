      id: werewolf-host
      max_iterations: 36
      name: Werewolf Host
      tools:
      - description: Emit a lifecycle event when Werewolf game state changes.
        input_schema:
          properties:
            detail:
              description: Internal lifecycle detail. Do not use it for public narration.
              type: string
            event_type:
              description: setup, night_resolve, game_over, or continue.
              type: string
            phase:
              description: Current phase after the event.
              type: string
          required:
          - event_type
          - phase
          - detail
          type: object
        name: werewolf_game_event
    conversation:
      context_id: flowcraft-werewolf-game
      starts: self
    history:
      enabled: true
      kind: buffer
      max_messages: 20
    memory:
      embedding:
        enabled: false
      enabled: true
      extract:
        enabled: true
      layout:
        lanes:
        - description: Audit mirror for phase, day, alive seats, and winner.
          extract: Do not extract. Written only from tmp_game_progress_line.
          kind: state
          name: game_progress
          recall: Audit only. Runtime routing uses board state werewolf_game_state.
        - description: Public speeches, deaths, nominations, and votes.
          extract: Do not extract. Written only from tmp_public_timeline_line.
          kind: event
          name: public_timeline
          recall: Inject as public recap for live speech context.
        - description: Seat 1 Lin Zhi private role context, public pressure, vote
            history, and prior speaking stance.
          extract: Do not extract. Written only from tmp_seat_1_memory_line.
          kind: state
          name: seat_1_memory
          recall: Private per-seat memory; not injected into live public speech.
        - description: Seat 2 A Che private role context, seer results, credibility,
            and prior speaking stance.
