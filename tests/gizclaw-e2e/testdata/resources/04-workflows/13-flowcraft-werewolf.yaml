              const mode = String(board.getVar("post_game_mode") || "host_only");
              let text = "这局已经结束，" + winner + "获胜。当前不会重新发牌或重开局，可以继续复盘刚才的发言、投票和身份安排。";
              if (mode === "role_chain") text = "以上是各位玩家的赛后复盘。这局已经结束，" + winner + "获胜；后续只继续复盘本局，不重新发牌。";
