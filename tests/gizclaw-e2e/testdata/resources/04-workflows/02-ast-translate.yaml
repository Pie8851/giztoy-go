---
apiVersion: gizclaw.admin/v1alpha1
kind: Workflow
metadata:
  name: volc-ast-translate
i18n:
  default_locale: en
  en:
    name: Realtime Speech Translator
    description: Translate a live conversation into another spoken language.
  zh-CN:
    name: 实时语音翻译
    description: 将实时对话翻译为另一种语言的语音。
spec:
  driver: ast-translate
  ast_translate:
    translation_model: volc-ast-translate
    mode: s2s
    voice:
      speaker_id: zh_female_vv_uranus_bigtts
    resource_id: volc.service_type.10053
    denoise: false
