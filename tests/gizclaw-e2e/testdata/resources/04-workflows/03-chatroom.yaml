---
apiVersion: gizclaw.admin/v1alpha1
kind: Workflow
metadata:
  name: chatroom
i18n:
  default_locale: en
  en:
    name: Social Chat Room
    description: Share messages in a persistent room with friends or family.
  zh-CN:
    name: 社交聊天室
    description: 与好友或家人在持久聊天室中交流消息。
spec:
  driver: chatroom
  chatroom:
    history:
      ttl: 168h
    transcript:
      enabled: true
      asr_model: volc-bigasr-sauc
