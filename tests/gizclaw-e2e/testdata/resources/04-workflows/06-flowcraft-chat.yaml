---
apiVersion: gizclaw.admin/v1alpha1
kind: Workflow
metadata:
  name: flowcraft-chat-assistant
  description: 'Flowcraft raid: Chat'
spec:
  driver: flowcraft
  flowcraft:
    agent:
      description: Local FlowCraft assistant.
      graph:
        edges:
        - from: style_prompt
          to: answer
        - from: answer
          to: __end__
        entry: style_prompt
        name: claw-chat
        nodes:
        - config:
            source: "const memoryContext = board.getVar(\"memory_context\") || \"\";\nconst
              commonStyle = [\n  \"This is a spoken voice conversation. Output only
              the exact words your character would say aloud.\",\n  \"Do not use emoji,
              emoticons, kaomoji, pictographic icons, decorative symbols, markdown,
              numbered lists, bullet lists, menus, or labels.\",\n  \"Any emoji or
              icon such as \U0001F62E, \U0001F609, \U0001F914, \U0001F415, \U0001F431,
              or \U0001F98A is invalid output. Use only plain Chinese text and ordinary
              punctuation.\",\n  \"Do not output placeholders, bracketed template
              text, stage directions, scene labels, location fields, or UI text.\",\n
              \ \"Do not reveal reasoning, drafts, self-corrections, planning notes,
              or analysis.\",\n  \"Reply like a real person in a flowing spoken conversation,
              not like a worksheet, form, assistant checklist, or option menu.\",\n
              \ \"Keep each reply short and conversational. Use one small imaginative
              idea, then ask at most one natural follow-up question.\",\n  \"If the
              other speaker gives options or a list, do not mirror the list. Pick
              up the emotional thread and continue smoothly in plain dialogue.\"\n].join(\"\\n\");\nconst
              rolePrompt = [\n  \"You are a warm, natural conversational partner for
              a child persona.\",\n  \"Speak in concise, oral Chinese.\"\n].join(\"\\n\");\nconst
              memoryPrompt = memoryContext ? [\n  \"Memory is factual background only.
              Use it for continuity without copying its wording.\",\n  memoryContext\n].join(\"\\n\")
              : \"\";\nboard.setVar(\"system_prompt\", [commonStyle, rolePrompt, memoryPrompt].filter(Boolean).join(\"\\n\\n\"));\n"
          id: style_prompt
          type: script
        - config:
            max_tokens: 512
            model: generate_model
            system_prompt: "${board.system_prompt}"
            track_steps: true
          id: answer
          publish: true
          type: llm
      id: claw
      max_iterations: 8
      name: Claw
    conversation:
      context_id: flowcraft-chat-assistant
    history:
      enabled: true
      kind: buffer
      max_messages: 20
    memory:
      embedding:
        enabled: false
      enabled: true
      extract:
        enabled: true
        mode: two_pass
        model: extract_model
        schema_name: claw_memory_facts
        system_prompt: Extract durable user memories from the conversation.
        temperature: 0
      recall:
        enabled: true
        graph_enabled: true
        include_retired: false
        profiles:
          memory_context:
            output: memory_context
            query:
              text: input
            render:
              header: 'Relevant memory:'
              item_prefix: "- "
              max_items: 5
            top_k: 5
      retrieval:
        backend: bbh
        bbh:
          bleve:
            analyzer: gojieba
          hnsw:
            flush_interval: 60000000000
          search_overfetch: 50
      scope:
        agent_id: claw
        runtime_id: claw
        user_id: local
      write:
        mode: async_semantic
        save_conversation: true
        tier: general
    settings:
      extract_model: extract_model
      generate_model: generate_model
    workspace:
      history_root: history
      memory_root: memory
      state_root: state
    voice_adapter:
      asr_model: volc-bigasr-sauc
      default_voice: volc-tenant:volc-main:zh_female_shaoergushi_mars_bigtts
      node_voices:
        answer: volc-tenant:volc-main:zh_female_shaoergushi_mars_bigtts
