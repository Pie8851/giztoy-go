---
apiVersion: gizclaw.admin/v1alpha1
kind: ResourceList
metadata:
  name: gameplay-system-task-models
spec:
  items:
  - apiVersion: gizclaw.admin/v1alpha1
    kind: Model
    metadata:
      name: reward-claim
    spec:
      kind: llm
      source: manual
      provider:
        kind: volc-tenant
        name: volc-ark
      name: Reward claim policy model
      description: System task model for reward claim decisions
      capabilities:
        json_output: true
        system_role: true
        text_only: true
        tool_calls: true
      provider_data:
        upstream_model: doubao-seed-2-0-lite-260215
        support_json_output: true
        support_text_only: true
        support_tool_calls: true
        use_system_role: true
  - apiVersion: gizclaw.admin/v1alpha1
    kind: Model
    metadata:
      name: pet-action
    spec:
      kind: llm
      source: manual
      provider:
        kind: volc-tenant
        name: volc-ark
      name: Pet action policy model
      description: System task model for pet action decisions
      capabilities:
        json_output: true
        system_role: true
        text_only: true
        tool_calls: true
      provider_data:
        upstream_model: doubao-seed-2-0-lite-260215
        support_json_output: true
        support_text_only: true
        support_tool_calls: true
        use_system_role: true
