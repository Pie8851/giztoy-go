---
apiVersion: gizclaw.admin/v1alpha1
kind: ResourceList
metadata:
  name: h106-tragon-gameplay
spec:
  items:
  - apiVersion: gizclaw.admin/v1alpha1
    kind: PetDef
    metadata:
      name: petdef-tragon
    spec:
      workflow_name: pet-care
      attr:
        life:
          hp:
            initial: 100
          wellness:
            initial: 100
          energy:
            initial: 100
          cleanliness:
            initial: 100
        progression:
          xp:
            initial: 0
      character:
        prompt: Compact blue pixel dragon with a rounded head, small horns, tiny wings, short legs, and playful brave behavior.
      voice:
        voice_id: volc-tenant:volc-main:zh_male_sunwukong_mars_bigtts
        prompt: Bright, curious, short spoken replies with childlike confidence.
      drive:
        actions:
        - id: idle
          cost: 0
          visual_clip_id: idle
        - id: feed
          cost: 6
          visual_clip_id: feed
          effect:
            attr_delta:
              life:
                wellness: 8
                energy: 4
            pet_exp_delta: 8
        - id: bath
          cost: 5
          visual_clip_id: bath
          effect:
            attr_delta:
              life:
                cleanliness: 15
            pet_exp_delta: 6
        - id: heal
          cost: 8
          visual_clip_id: heal
          effect:
            attr_delta:
              life:
                hp: 15
                wellness: 8
            pet_exp_delta: 8
      visual:
        refs:
          images: []
          videos: []
        pixa:
          asset_ref: asset://h106/tiga/pets/tragon/tragon.pixa
          metadata:
            version: "1"
            canvas:
              width: 60
              height: 60
            clips:
            - id: idle
              action_id: idle
              pixa_clip_name: idle
            - id: feed
              action_id: feed
              pixa_clip_name: feed
            - id: bath
              action_id: bath
              pixa_clip_name: bath
            - id: heal
              action_id: heal
              pixa_clip_name: heal
            - id: hungry
              pixa_clip_name: hungry
            - id: sick
              pixa_clip_name: sick
            - id: dirty
              pixa_clip_name: dirty
            - id: confuse
              pixa_clip_name: confuse
            - id: dying
              pixa_clip_name: dying
            - id: dead
              pixa_clip_name: dead
            - id: reborn
              pixa_clip_name: reborn
    i18n:
      default_locale: en
      en:
        display_name: Tragon
        description: A brave little dragon from H106 who perks up when you feed, bathe, or heal it.
        attr:
          life:
            hp:
              display_name: HP
            wellness:
              display_name: Wellness
            energy:
              display_name: Energy
            cleanliness:
              display_name: Cleanliness
          progression:
            xp:
              display_name: EXP
        drive:
          actions:
            idle:
              display_name: Idle
            feed:
              display_name: Feed
            bath:
              display_name: Bath
            heal:
              display_name: Heal
      zh-CN:
        display_name: 小蓝龙
        description: 来自 H106 的勇敢小龙，喜欢吃饭、洗澡和被照顾。
        attr:
          life:
            hp:
              display_name: 生命
            wellness:
              display_name: 状态
            energy:
              display_name: 精力
            cleanliness:
              display_name: 清洁
          progression:
            xp:
              display_name: 经验
        drive:
          actions:
            idle:
              display_name: 陪伴
            feed:
              display_name: 喂食
            bath:
              display_name: 洗澡
            heal:
              display_name: 治疗
  - apiVersion: gizclaw.admin/v1alpha1
    kind: GameRuleset
    metadata:
      name: h106-tragon
    spec:
      enabled: true
      description: H106 Tragon mobile app preview ruleset.
      default_workflow_name: pet-care
      points:
        initial_balance: 100
      pet_pool:
      - petdef_id: petdef-tragon
        weight: 100
        rarity: rare
        adoption_cost: 10
        workflow_name: pet-care
