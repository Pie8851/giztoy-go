---
apiVersion: gizclaw.admin/v1alpha1
kind: ResourceList
metadata:
  name: h106-tragon-gameplay
spec:
  items:
  - apiVersion: gizclaw.admin/v1alpha1
    kind: PetDef
    metadata:
      name: petdef-tragon
    spec:
      character:
        prompt: Compact blue pixel dragon with a rounded head, small horns, tiny wings, short legs, and playful brave behavior.
      voice:
        prompt: Bright, curious, short spoken replies with childlike confidence.
      visual:
        refs:
          images: []
          videos: []
        bindings:
          behaviors: {feed: feed, bathe: bath, play: idle, heal: heal}
          states: {idle: idle, sick: sick, dead: dead}
        pixa:
          asset_ref: asset://h106/tiga/pets/tragon/tragon.pixa
          metadata:
            version: "1"
            canvas:
              width: 60
              height: 60
            clips:
            - id: idle
              pixa_clip_name: idle
            - id: feed
              pixa_clip_name: feed
            - id: bath
              pixa_clip_name: bath
            - id: heal
              pixa_clip_name: heal
            - id: hungry
              pixa_clip_name: hungry
            - id: sick
              pixa_clip_name: sick
            - id: dirty
              pixa_clip_name: dirty
            - id: confuse
              pixa_clip_name: confuse
            - id: dying
              pixa_clip_name: dying
            - id: dead
              pixa_clip_name: dead
            - id: reborn
              pixa_clip_name: reborn
  - apiVersion: gizclaw.admin/v1alpha1
    kind: RuntimeProfile
    metadata:
      name: h106-tragon
    spec:
      workflows:
        system:
          friend_chatroom: chatroom
          group_chatroom: chatroom
          pet: pet-care
        collections: {}
      resources:
        models:
          pet-chat: {resource_id: pet-flowcraft-workflow-chat, i18n: {en: {display_name: Pet chat}, zh-CN: {display_name: 宠物对话}}}
          pet-extract: {resource_id: pet-flowcraft-workflow-extract, i18n: {en: {display_name: Pet extraction}, zh-CN: {display_name: 宠物提取}}}
          pet-asr: {resource_id: pet-flowcraft-workflow-asr, i18n: {en: {display_name: Pet ASR}, zh-CN: {display_name: 宠物语音识别}}}
        voices:
          tragon-voice: {resource_id: "volc-tenant:volc-main:zh_male_sunwukong_mars_bigtts", i18n: {en: {display_name: Tragon voice}, zh-CN: {display_name: 小蓝龙音色}}}
        pet_defs:
          tragon-pet: {resource_id: petdef-tragon, i18n: {en: {display_name: Tragon}, zh-CN: {display_name: 小蓝龙}}}
      gameplay:
        points:
          initial_balance: 100
        adoption:
          pool:
          - pet_def: tragon-pet
            weight: 100
            rarity: rare
            adoption_cost: 10
        pet:
          time:
            care_decay_per_hour: {health: 0.5, satiety: 1.3888888889, hygiene: 0.7, mood: 1}
            energy_recovery_per_hour: 10
            life_decay:
              max_loss_per_hour: 4
              exponent: 2
              contributing_weights: {health: 0.25, satiety: 0.25, hygiene: 0.25, mood: 0.25}
          experience:
            energy_per_pet_exp: 5
            leveling: {base_exp: 30, log_scale: 10}
          actions:
            feed: {energy_cost: 10, stat_delta: 10}
            bathe: {energy_cost: 10, stat_delta: 10}
            play: {energy_cost: 10, stat_delta: 10}
            heal: {energy_cost: 10, stat_delta: 10}
          games: {}
