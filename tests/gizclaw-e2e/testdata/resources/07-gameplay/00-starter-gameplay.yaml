---
apiVersion: gizclaw.admin/v1alpha1
kind: ResourceList
metadata:
  name: starter-gameplay
spec:
  items:
  - apiVersion: gizclaw.admin/v1alpha1
    kind: PetDef
    metadata:
      name: petdef-starter
    spec:
      workflow_name: pet-care
      attr:
        life:
          hunger:
            initial: 100
          clean:
            initial: 100
        progression:
          xp:
            initial: 0
      character:
        prompt: Starter gameplay test pet with a clear friendly pixel-sprite silhouette.
      voice:
        voice_id: volc-tenant:volc-main:zh_female_shaoergushi_mars_bigtts
        prompt: Short warm replies with curious, friendly energy.
      drive:
        actions:
        - id: idle
          cost: 0
          visual_clip_id: idle
        - id: bath
          cost: 5
          visual_clip_id: bath
          effect:
            attr_delta:
              life:
                clean: 10
            pet_exp_delta: 80
      visual:
        refs:
          images: []
          videos: []
        pixa:
          asset_ref: asset://pets/starter/pet.pixa
          metadata:
            version: "1"
            canvas:
              width: 60
              height: 60
            clips:
            - id: idle
              action_id: idle
              pixa_clip_name: idle
            - id: bath
              action_id: bath
              pixa_clip_name: bath
    i18n:
      default_locale: en
      en:
        display_name: Starter Pet
        description: Starter pet for gameplay e2e coverage.
        attr:
          life:
            hunger:
              display_name: Hunger
            clean:
              display_name: Clean
          progression:
            xp:
              display_name: XP
        drive:
          actions:
            idle:
              display_name: Idle
            bath:
              display_name: Bath
  - apiVersion: gizclaw.admin/v1alpha1
    kind: BadgeDef
    metadata:
      name: badge-starter
    spec:
      display_name: Starter Badge
      description: First gameplay badge used by e2e coverage.
  - apiVersion: gizclaw.admin/v1alpha1
    kind: GameDef
    metadata:
      name: game-starter
    spec:
      display_name: Starter Game
      description: Starter score-based game used by e2e coverage.
      outcomes:
      - win
      - lose
  - apiVersion: gizclaw.admin/v1alpha1
    kind: GameRuleset
    metadata:
      name: default-gameplay
    spec:
      enabled: true
      description: Default gameplay e2e ruleset.
      default_workflow_name: pet-care
      points:
        initial_balance: 100
      pet_pool:
      - petdef_id: petdef-starter
        weight: 100
        rarity: common
        adoption_cost: 10
        workflow_name: pet-care
      badge_def_ids:
      - badge-starter
      game_def_ids:
      - game-starter
      drive:
        game_rewards:
          game-starter:
            points_delta: 20
            pet_exp_delta: 25
            badge_exp_delta:
              badge-starter: 100
