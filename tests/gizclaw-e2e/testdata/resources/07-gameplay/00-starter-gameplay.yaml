---
apiVersion: gizclaw.admin/v1alpha1
kind: ResourceList
metadata:
  name: starter-gameplay
spec:
  items:
  - apiVersion: gizclaw.admin/v1alpha1
    kind: PetDef
    metadata:
      name: petdef-starter
    spec:
      character:
        prompt: Starter gameplay test pet with a clear friendly pixel-sprite silhouette.
      voice:
        prompt: Short warm replies with curious, friendly energy.
      visual:
        refs:
          images: []
          videos: []
        bindings:
          behaviors: {feed: idle, bathe: bath, play: idle, heal: idle}
          states: {idle: idle, sick: idle, dead: idle}
        pixa:
          asset_ref: asset://pets/starter/pet.pixa
          metadata:
            version: "1"
            canvas:
              width: 60
              height: 60
            clips:
            - id: idle
              pixa_clip_name: idle
            - id: bath
              pixa_clip_name: bath
  - apiVersion: gizclaw.admin/v1alpha1
    kind: BadgeDef
    metadata:
      name: badge-starter
    spec:
      display_name: Starter Badge
      description: First gameplay badge used by e2e coverage.
  - apiVersion: gizclaw.admin/v1alpha1
    kind: GameDef
    metadata:
      name: game-starter
    spec:
      display_name: Starter Game
      description: Starter score-based game used by e2e coverage.
      outcomes:
      - win
      - lose
  - apiVersion: gizclaw.admin/v1alpha1
    kind: RuntimeProfile
    metadata:
      name: default-gameplay
    spec:
      workflows:
        system:
          friend_chatroom: chatroom
          group_chatroom: chatroom
          pet: pet-care
        collections: {}
      resources:
        models:
          pet-chat: {resource_id: pet-flowcraft-workflow-chat, i18n: {en: {display_name: Pet chat}, zh-CN: {display_name: 宠物对话}}}
          pet-extract: {resource_id: pet-flowcraft-workflow-extract, i18n: {en: {display_name: Pet extraction}, zh-CN: {display_name: 宠物提取}}}
          pet-asr: {resource_id: pet-flowcraft-workflow-asr, i18n: {en: {display_name: Pet ASR}, zh-CN: {display_name: 宠物语音识别}}}
        voices:
          pet: {resource_id: "volc-tenant:volc-main:zh_female_shaoergushi_mars_bigtts", i18n: {en: {display_name: Pet voice}, zh-CN: {display_name: 宠物音色}}}
        pet_defs:
          starter-pet: {resource_id: petdef-starter, i18n: {en: {display_name: Starter Pet}, zh-CN: {display_name: 初始宠物}}}
        badge_defs:
          starter-badge: {resource_id: badge-starter, i18n: {en: {display_name: Starter Badge}, zh-CN: {display_name: 初始徽章}}}
        game_defs:
          starter-game: {resource_id: game-starter, i18n: {en: {display_name: Starter Game}, zh-CN: {display_name: 初始游戏}}}
      gameplay:
        points:
          initial_balance: 100
        adoption:
          pool:
          - pet_def: starter-pet
            weight: 100
            rarity: common
            adoption_cost: 10
        pet:
          time:
            care_decay_per_hour: {health: 0.5, satiety: 1.3888888889, hygiene: 0.7, mood: 1}
            energy_recovery_per_hour: 10
            life_decay:
              max_loss_per_hour: 4
              exponent: 2
              contributing_weights: {health: 0.25, satiety: 0.25, hygiene: 0.25, mood: 0.25}
          experience:
            energy_per_pet_exp: 5
            leveling: {base_exp: 30, log_scale: 10}
          actions:
            feed: {energy_cost: 10, stat_delta: 10}
            bathe: {energy_cost: 10, stat_delta: 10}
            play: {energy_cost: 10, stat_delta: 10}
            heal: {energy_cost: 10, stat_delta: 10}
          games:
            starter-game:
              energy_cost: 10
              points_cost: 10
              reward:
                model: pet-chat
                pet_exp_max: 25
                badge_exp_max_per_badge: 100
                prompt: Evaluate the validated starter game result and award only demonstrated progress.
