  string provider = 5;
  string updated_at = 6;
}

message CredentialBody {
  oneof value {
    OpenAICredentialBody open_aicredential_body = 1;
    GeminiCredentialBody gemini_credential_body = 2;
    DashScopeCredentialBody dash_scope_credential_body = 3;
    MiniMaxCredentialBody mini_max_credential_body = 4;
    VolcCredentialBody volc_credential_body = 5;
  }
}

