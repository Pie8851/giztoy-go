  optional DoubaoRealtimeASRExtension asr = 1;
  optional DoubaoRealtimeDialogExtension dialog = 2;
  optional DoubaoRealtimeTTSExtension tts = 3;
}

message DoubaoRealtimeFunctionTool {
  optional string description = 1;
  string name = 2;
  optional DoubaoRealtimeJSONSchema parameters = 3;
  optional bool strict = 4;
  DoubaoRealtimeFunctionToolType type = 5;
}

message DoubaoRealtimeJSONSchema {
  optional bool additional_properties = 1 [json_name = "additionalProperties"];
  repeated DoubaoRealtimeJSONSchema any_of = 2 [json_name = "anyOf"];
  optional string description = 3;
  repeated string enum_values = 4 [json_name = "enum"];
  optional DoubaoRealtimeJSONSchema items = 5;
  optional int64 max_length = 6 [json_name = "maxLength"];
  optional double maximum = 7;
  optional int64 min_length = 8 [json_name = "minLength"];
  optional double minimum = 9;
  map<string, DoubaoRealtimeJSONSchema> properties = 10;
  repeated string required = 11;
  optional string type = 12;
}

message DoubaoRealtimeTTSExtension {
