syntax = "proto3";

package gizclaw.rpc.v1;

import "google/protobuf/descriptor.proto";

option go_package = "github.com/GizClaw/gizclaw-go/pkgs/gizclaw/api/rpcproto;rpcpb";

message RpcResponse {
  string id = 1;
  oneof body {
    bytes payload = 2;
    RpcError error = 3;
  }
}

message RpcStreamFrame {
  string id = 1;
  oneof body {
    bytes payload = 2;
    RpcError error = 3;
    RpcStreamEnd end = 4;
  }
}

message RpcError {
  RpcErrorCode code = 1;
  string message = 2;
}

message RpcStreamEnd {}

enum RpcErrorCode {
  RPC_ERROR_CODE_UNSPECIFIED = 0;
  RPC_ERROR_CODE_PARSE_ERROR = -32700;
  RPC_ERROR_CODE_INVALID_REQUEST = -32600;
  RPC_ERROR_CODE_METHOD_NOT_FOUND = -32601;
  RPC_ERROR_CODE_INVALID_PARAMS = -32602;
  RPC_ERROR_CODE_INTERNAL_ERROR = -32603;
  RPC_ERROR_CODE_BAD_REQUEST = 400;
  RPC_ERROR_CODE_FORBIDDEN = 403;
  RPC_ERROR_CODE_NOT_FOUND = 404;
  RPC_ERROR_CODE_CONFLICT = 409;
}


message RpcMethodOptions {
  string name = 1;
  string request = 2;
  string response = 3;
}

extend google.protobuf.EnumValueOptions {
  RpcMethodOptions rpc_method = 51000;
}

message RpcRequest {
  string id = 1;
  RpcMethod method = 2;
  optional bytes payload = 3;
}

