// Peer RPC ai payload protobuf schema.

syntax = "proto3";

package gizclaw.rpc.v1;

import "google/protobuf/struct.proto";
import "payload/enums.proto";

option go_package = "github.com/GizClaw/gizclaw-go/pkgs/gizclaw/api/rpcproto;rpcpb";

message AliasI18nText {
  string display_name = 1;
  optional string description = 2;
}

message SpeechTranscribeRequest {
  string model_alias = 1;
  string content_type = 2;
  optional string language = 3;
}

message SpeechTranscribeResponse {
  string transcript = 1;
}

message SpeechSynthesizeRequest {
  string voice_alias = 1;
  string text = 2;
  repeated string accepted_content_types = 3;
}

message SpeechSynthesizeResponse {
  string content_type = 1;
  optional int32 sample_rate_hz = 2;
  optional int32 channels = 3;
}

message ASTTranslateExternalVoiceParameters {
  string tts_voice = 1;
}

message ASTTranslateInternalSpeakerParameters {
  optional bool is_custom_speaker = 1;
  string speaker_id = 2;
  optional int64 speech_rate = 3;
  optional string tts_resource_id = 4;
}

message ASTTranslateVoiceParameters {
  oneof value {
    ASTTranslateInternalSpeakerParameters asttranslate_internal_speaker_parameters = 1;
    ASTTranslateExternalVoiceParameters asttranslate_external_voice_parameters = 2;
  }
}

message ASTTranslateWorkflowSpec {
  optional bool denoise = 1;
  optional bool enable_source_language_detect = 2;
  optional ASTTranslateMode mode = 3;
  optional string resource_id = 4;
  string translation_model = 5;
  optional ASTTranslateVoiceParameters voice = 6;
  optional string lang_pair = 7;
}

message ASTTranslateWorkspaceParameters {
  ASTTranslateWorkspaceParametersAgentType agent_type = 1;
  optional bool denoise = 2;
  optional bool e2e = 3;
  optional bool enable_source_language_detect = 4;
  optional WorkspaceInputMode input = 5;
  optional string lang_pair = 6;
  optional ASTTranslateMode mode = 7;
  optional string translation_model = 8;
  optional ASTTranslateVoiceParameters voice = 9;
}

message ChatRoomWorkflowHistorySpec {
  optional string ttl = 1;
}

message ChatRoomWorkflowSpec {
  ChatRoomWorkflowHistorySpec history = 1;
  optional ChatRoomWorkflowTranscriptSpec transcript = 2;
}

message ChatRoomWorkflowTranscriptSpec {
  optional string asr_model = 1;
  optional bool enabled = 2;
}

message ChatRoomWorkspaceHistoryParameters {
  optional string ttl = 1;
}

message ChatRoomWorkspaceParameters {
  ChatRoomWorkspaceParametersAgentType agent_type = 1;
  optional ChatRoomWorkspaceHistoryParameters history = 2;
  optional WorkspaceInputMode input = 3;
  optional ChatRoomMode mode = 4;
  optional ChatRoomWorkspaceTranscriptParameters transcript = 5;
}

message ChatRoomWorkspaceTranscriptParameters {
  optional string asr_model = 1;
  optional bool enabled = 2;
}

message DoubaoRealtimeAIGCMetadata {
  optional string content_producer = 1;
  optional string content_propagator = 2;
  optional bool enable = 3;
  optional string produce_id = 4;
  optional string propagate_id = 5;
}

message DoubaoRealtimeASRContext {
  map<string, string> correct_words = 1;
  repeated DoubaoRealtimeASRHotword hotwords = 2;
}

message DoubaoRealtimeASRExtension {
  optional DoubaoRealtimeASRExtra extra = 1;
}

message DoubaoRealtimeASRExtra {
  optional string boosting_table_id = 1;
  optional string boosting_table_name = 2;
  optional DoubaoRealtimeASRContext context = 3;
  optional bool enable_asr_twopass = 4;
  optional bool enable_custom_vad = 5;
  optional int64 end_smooth_window_ms = 6;
  optional string regex_correct_table_id = 7;
  optional string regex_correct_table_name = 8;
}

message DoubaoRealtimeASRHotword {
  string word = 1;
}

message DoubaoRealtimeAudio {
  DoubaoRealtimeAudioInput input = 1;
  DoubaoRealtimeAudioOutput output = 2;
}

message DoubaoRealtimeAudioFormat {
  int64 rate = 1;
  DoubaoRealtimeAudioFormatType type = 2;
}

message DoubaoRealtimeAudioInput {
  DoubaoRealtimeAudioFormat format = 1;
}

message DoubaoRealtimeAudioOutput {
  DoubaoRealtimeAudioFormat format = 1;
  optional int64 loudness = 2;
  optional int64 speed = 3;
  optional string voice = 4;
}

message DoubaoRealtimeDialogExtension {
  optional DoubaoRealtimeDialogExtra extra = 1;
}

message DoubaoRealtimeDialogExtra {
  optional string audit_response = 1;
  optional bool enable_conversation_truncate = 2;
  optional bool enable_loudness_norm = 3;
  optional bool enable_music = 4;
  optional bool enable_user_query_exit = 5;
  optional bool enable_volc_websearch = 6;
  optional bool strict_audit = 7;
  optional string volc_websearch_bot_id = 8;
  optional string volc_websearch_no_result_message = 9;
  optional int64 volc_websearch_result_count = 10;
  optional DoubaoRealtimeDialogExtraVolcWebsearchType volc_websearch_type = 11;
}

message DoubaoRealtimeExtension {
  optional DoubaoRealtimeASRExtension asr = 1;
  optional DoubaoRealtimeDialogExtension dialog = 2;
  optional DoubaoRealtimeTTSExtension tts = 3;
}

message DoubaoRealtimeFunctionTool {
  optional string description = 1;
  string name = 2;
  optional DoubaoRealtimeJSONSchema parameters = 3;
  optional bool strict = 4;
  DoubaoRealtimeFunctionToolType type = 5;
}

message DoubaoRealtimeJSONSchema {
  optional bool additional_properties = 1 [json_name = "additionalProperties"];
  repeated DoubaoRealtimeJSONSchema any_of = 2 [json_name = "anyOf"];
  optional string description = 3;
  repeated string enum_values = 4 [json_name = "enum"];
  optional DoubaoRealtimeJSONSchema items = 5;
  optional int64 max_length = 6 [json_name = "maxLength"];
  optional double maximum = 7;
  optional int64 min_length = 8 [json_name = "minLength"];
  optional double minimum = 9;
  map<string, DoubaoRealtimeJSONSchema> properties = 10;
  repeated string required = 11;
  optional string type = 12;
}

message DoubaoRealtimeTTSExtension {
  optional DoubaoRealtimeTTSExtra extra = 1;
}

message DoubaoRealtimeTTSExtra {
  optional DoubaoRealtimeAIGCMetadata aigc_metadata = 1;
  optional string explicit_dialect = 2;
  optional string tts_2_0_model = 3;
}

message DoubaoRealtimeWorkflowSpec {
  optional DoubaoRealtimeAudio audio = 1;
  optional DoubaoRealtimeExtension extension = 2;
  optional string instructions = 3;
  string model = 4;
  repeated DoubaoRealtimeFunctionTool tools = 5;
}

message DoubaoRealtimeWorkspaceParameters {
  DoubaoRealtimeWorkspaceParametersAgentType agent_type = 1;
  optional DoubaoRealtimeAudio audio = 2;
  optional bool e2e = 3;
  optional DoubaoRealtimeExtension extension = 4;
  optional WorkspaceInputMode input = 5;
  optional string instructions = 6;
  optional string model = 7;
  repeated DoubaoRealtimeFunctionTool tools = 8;
}

message FlowcraftConversationParameters {
  optional FlowcraftConversationParametersAgentInitiativePolicy agent_initiative_policy = 1;
  optional FlowcraftConversationParametersInitiative initiative = 2;
}

message FlowcraftWorkflowSpec {
  google.protobuf.Struct fields = 1;
}

message FlowcraftWorkspaceParameters {
  reserved 4, 5, 6;
  reserved "generate_model", "extract_model", "embedding_model";

  FlowcraftWorkspaceParametersAgentType agent_type = 1;
  optional FlowcraftConversationParameters conversation = 2;
  optional bool e2e = 3;
  optional WorkspaceInputMode input = 7;
}

message PetWorkflowSpec {
  ReusableWorkflowDriver driver = 1;
  optional ToolkitPolicy toolkit = 2;
  optional FlowcraftWorkflowSpec flowcraft = 3;
  optional DoubaoRealtimeWorkflowSpec doubao_realtime = 4;
  optional ASTTranslateWorkflowSpec ast_translate = 5;
  optional ChatRoomWorkflowSpec chatroom = 6;
}

message Model {
  string alias = 1;
  map<string, AliasI18nText> i18n = 2;
  ModelKind kind = 3;
  reserved 4;
  oneof provider_data {
    OpenAITenantModelProviderData openai_tenant = 5;
    GeminiTenantModelProviderData gemini_tenant = 6;
    DashScopeTenantModelProviderData dashscope_tenant = 7;
    VolcTenantModelProviderData volc_tenant = 8;
    MiniMaxTenantModelProviderData minimax_tenant = 9;
    DeepSeekTenantModelProviderData deepseek_tenant = 10;
  }
  ModelProviderKind provider_kind = 11;
}

enum ModelProviderKind {
  MODEL_PROVIDER_KIND_UNSPECIFIED = 0;
  MODEL_PROVIDER_KIND_OPENAI_TENANT = 1;
  MODEL_PROVIDER_KIND_GEMINI_TENANT = 2;
  MODEL_PROVIDER_KIND_DASHSCOPE_TENANT = 3;
  MODEL_PROVIDER_KIND_VOLC_TENANT = 4;
  MODEL_PROVIDER_KIND_MINIMAX_TENANT = 5;
  MODEL_PROVIDER_KIND_DEEPSEEK_TENANT = 6;
}

message OpenAITenantModelProviderData {
  optional string upstream_model = 1;
  optional bool support_json_output = 2;
  optional bool support_tool_calls = 3;
  optional bool support_text_only = 4;
  optional bool support_temperature = 5;
  optional bool support_thinking = 6;
  optional bool use_system_role = 7;
  optional string thinking_param = 8;
  optional string thinking_level_param = 9;
  repeated string thinking_levels = 10;
  optional string default_thinking_level = 11;
}

message GeminiTenantModelProviderData {
  optional string upstream_model = 1;
  optional bool support_json_output = 2;
  optional bool support_tool_calls = 3;
  optional bool support_text_only = 4;
  optional bool support_temperature = 5;
  optional bool support_thinking = 6;
  optional bool use_system_role = 7;
  optional string thinking_param = 8;
  optional string thinking_level_param = 9;
  repeated string thinking_levels = 10;
  optional string default_thinking_level = 11;
}

message DashScopeTenantModelProviderData {
  optional string upstream_model = 1;
  optional string api_mode = 2;
  optional bool support_json_output = 3;
  optional bool support_tool_calls = 4;
  optional bool support_text_only = 5;
  optional bool support_temperature = 6;
  optional bool support_thinking = 7;
  optional bool use_system_role = 8;
  optional string thinking_param = 9;
  optional string thinking_level_param = 10;
  repeated string thinking_levels = 11;
  optional string default_thinking_level = 12;
}

message VolcTenantModelProviderData {
  optional string upstream_model = 1;
  optional string resource_id = 2;
  optional string api_mode = 3;
  optional bool support_json_output = 4;
  optional bool support_tool_calls = 5;
  optional bool support_text_only = 6;
  optional bool support_temperature = 7;
  optional bool support_thinking = 8;
  optional bool use_system_role = 9;
  optional string thinking_param = 10;
  optional string thinking_level_param = 11;
  repeated string thinking_levels = 12;
  optional string default_thinking_level = 13;
}

message MiniMaxTenantModelProviderData {
  string upstream_model = 1;
  string api_mode = 2;
  optional bool support_json_output = 3;
  optional bool support_tool_calls = 4;
  optional bool support_text_only = 5;
  optional bool support_temperature = 6;
  optional bool support_thinking = 7;
  optional bool use_system_role = 8;
  optional string thinking_param = 9;
  optional string thinking_level_param = 10;
  repeated string thinking_levels = 11;
  optional string default_thinking_level = 12;
}

message DeepSeekTenantModelProviderData {
  string upstream_model = 1;
  string api_mode = 2;
  optional bool support_json_output = 3;
  optional bool support_tool_calls = 4;
  optional bool support_text_only = 5;
  optional bool support_temperature = 6;
  optional bool support_thinking = 7;
  optional bool use_system_role = 8;
  optional string thinking_param = 9;
  optional string thinking_level_param = 10;
  repeated string thinking_levels = 11;
  optional string default_thinking_level = 12;
}

message ModelGetRequest {
  string alias = 1;
}

message ModelGetResponse {
  Model value = 1;
  string runtime_profile_name = 2;
  string runtime_profile_revision = 3;
}

message ModelListRequest {
  optional string cursor = 1;
  optional int64 limit = 2;
}

message ModelListResponse {
  bool has_next = 1;
  repeated Model items = 2;
  optional string next_cursor = 3;
  string runtime_profile_name = 4;
  string runtime_profile_revision = 5;
}

message Voice {
  string alias = 1;
  map<string, AliasI18nText> i18n = 2;
}

message VoiceGetRequest {
  string alias = 1;
}

message VoiceGetResponse {
  Voice value = 1;
  string runtime_profile_name = 2;
  string runtime_profile_revision = 3;
}

message VoiceListRequest {
  optional string cursor = 1;
  optional int64 limit = 2;
}

message VoiceListResponse {
  bool has_next = 1;
  repeated Voice items = 2;
  optional string next_cursor = 3;
  string runtime_profile_name = 4;
  string runtime_profile_revision = 5;
}

message Workflow {
  string alias = 1;
  map<string, AliasI18nText> i18n = 2;
  string collection = 3;
  WorkflowDriver driver = 4;
  optional string workspace_lang_pair = 5;
}

message WorkflowGetRequest {
  string alias = 1;
}

message WorkflowGetResponse {
  Workflow value = 1;
  string runtime_profile_name = 2;
  string runtime_profile_revision = 3;
}

message WorkflowListRequest {
  optional string cursor = 1;
  optional int64 limit = 2;
  string collection = 3;
}

message WorkflowListResponse {
  bool has_next = 1;
  repeated Workflow items = 2;
  optional string next_cursor = 3;
  string runtime_profile_name = 4;
  string runtime_profile_revision = 5;
}

message ToolkitPolicyToolIds {
  repeated string value = 1;
}

message ToolkitPolicy {
  optional ToolkitPolicyToolIds tool_ids = 1;
}

message Tool {
  string alias = 1;
  map<string, AliasI18nText> i18n = 2;
  google.protobuf.Struct input_schema = 3;
  optional google.protobuf.Struct output_schema = 4;
}

message ToolListRequest {
  optional string cursor = 1;
  optional int64 limit = 2;
}

message ToolListResponse {
  repeated Tool items = 1;
  bool has_next = 2;
  optional string next_cursor = 3;
  string runtime_profile_name = 4;
  string runtime_profile_revision = 5;
}

message ToolGetRequest {
  string alias = 1;
}

message ToolGetResponse {
  Tool value = 1;
  string runtime_profile_name = 2;
  string runtime_profile_revision = 3;
}

message ToolInvokeRequest {
  string call_id = 1;
  string tool_id = 2;
  string method = 3;
  google.protobuf.Struct args = 4;
}

message ToolInvokeResponse {
  string data_json = 1;
}
