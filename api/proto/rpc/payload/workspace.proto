// Peer RPC workspace payload protobuf schema.

syntax = "proto3";

package gizclaw.rpc.v1;

import "google/protobuf/struct.proto";
import "payload/enums.proto";
import "payload/icon.proto";
import "payload/system.proto";
import "payload/ai.proto";

option go_package = "github.com/GizClaw/gizclaw-go/pkgs/gizclaw/api/rpcproto;rpcpb";

message AgentSelection {
  string workspace_name = 1;
}

message PeerRunAgent {
  optional AgentSelection active = 1;
  optional AgentSelection pending = 2;
}

message PeerRunHistoryEntry {
  string created_at = 1;
  optional string gear_id = 2;
  string id = 3;
  string name = 4;
  bool replay_available = 5;
  string text = 6;
  PeerRunHistoryEntryType type = 7;
}

message PeerRunHistoryListRequest {
  optional string cursor = 1;
  optional int64 limit = 2;
  optional PeerRunHistoryListRequestOrder order = 3;
}

message PeerRunHistoryListResponse {
  bool available = 1;
  bool has_next = 2;
  repeated PeerRunHistoryEntry items = 3;
  optional string message = 4;
  optional string next_cursor = 5;
}

message PeerRunHistoryPlayRequest {
  string history_id = 1;
}

message PeerRunHistoryPlayResponse {
  bool accepted = 1;
  string history_id = 2;
  optional string message = 3;
  string state = 4;
}

message PeerRunMemoryStatsRequest {
}

message PeerRunMemoryStatsResponse {
  bool available = 1;
  optional string backend = 2;
  optional bool embedding_enabled = 3;
  optional string embedding_status = 4;
  bool enabled = 5;
  optional string index_status = 6;
  int64 item_count = 7;
  optional string last_updated_at = 8;
  optional string message = 9;
  google.protobuf.Struct metadata = 10;
  int64 storage_bytes = 11;
}

message PeerRunRecallHit {
  optional string created_at = 1;
  string id = 2;
  google.protobuf.Struct metadata = 3;
  double score = 4;
  string snippet = 5;
  optional string source_id = 6;
  optional string source_type = 7;
}

message PeerRunRecallRequest {
  optional google.protobuf.Struct filters = 1;
  optional int64 limit = 2;
  string query = 3;
}

message PeerRunRecallResponse {
  bool available = 1;
  repeated PeerRunRecallHit hits = 2;
  optional string message = 3;
}

message PeerRunStatus {
  optional string message = 1;
  optional string started_at = 2;
  PeerRunStatusState state = 3;
  optional string updated_at = 4;
  optional string workspace_name = 5;
}

message PeerRunWorkspaceState {
  optional string active_workspace_name = 1;
  optional string agent_type = 2;
  optional bool history_available = 3;
  optional bool memory_stats_available = 4;
  optional string message = 5;
  optional string pending_workspace_name = 6;
  optional bool recall_available = 7;
  PeerRunStatusState runtime_state = 8;
  optional string selected_workspace_name = 9;
  optional string started_at = 10;
  optional string updated_at = 11;
  optional string workflow_name = 12;
  string workspace_name = 13;
}

message ServerGetRunAgentRequest {
}

message ServerGetRunAgentResponse {
  PeerRunAgent value = 1;
}

message ServerGetRunStatusRequest {
}

message ServerGetRunStatusResponse {
  PeerRunStatus value = 1;
}

message ServerGetRunWorkspaceMemoryStatsRequest {
  PeerRunMemoryStatsRequest value = 1;
}

message ServerGetRunWorkspaceMemoryStatsResponse {
  PeerRunMemoryStatsResponse value = 1;
}

message ServerGetRunWorkspaceRequest {
}

message ServerGetRunWorkspaceResponse {
  PeerRunWorkspaceState value = 1;
}

message ServerGetRuntimeRequest {
}

message ServerGetRuntimeResponse {
  Runtime value = 1;
}

message ServerListRunWorkspaceHistoryRequest {
  PeerRunHistoryListRequest value = 1;
}

message ServerListRunWorkspaceHistoryResponse {
  PeerRunHistoryListResponse value = 1;
}

message ServerPlayRunWorkspaceHistoryRequest {
  PeerRunHistoryPlayRequest value = 1;
}

message ServerPlayRunWorkspaceHistoryResponse {
  PeerRunHistoryPlayResponse value = 1;
}

message ServerReloadRunRequest {
}

message ServerReloadRunResponse {
  PeerRunStatus value = 1;
}

message ServerReloadRunWorkspaceRequest {
}

message ServerReloadRunWorkspaceResponse {
  PeerRunWorkspaceState value = 1;
}

message ServerRunSayRequest {
  string text = 1;
  string voice_alias = 2;
}

message ServerRunSayResponse {
  bool accepted = 1;
}

message ServerRunWorkspaceRecallRequest {
  PeerRunRecallRequest value = 1;
}

message ServerRunWorkspaceRecallResponse {
  PeerRunRecallResponse value = 1;
}

message ServerSetRunAgentRequest {
  AgentSelection value = 1;
}

message ServerSetRunAgentResponse {
  PeerRunAgent value = 1;
}

message ServerSetRunWorkspaceRequest {
  AgentSelection value = 1;
}

message ServerSetRunWorkspaceResponse {
  PeerRunWorkspaceState value = 1;
}

message ServerStopRunRequest {
}

message ServerStopRunResponse {
  PeerRunStatus value = 1;
}

message Workspace {
  string created_at = 1;
  string last_active_at = 2;
  string name = 3;
  optional WorkspaceParameters parameters = 4;
  string updated_at = 5;
  string workflow_alias = 6;
  optional ToolkitPolicy toolkit = 7;
  bool system = 8;
  optional Icon icon = 9;
  optional string owner_public_key = 10;
  bool available = 11;
}

message WorkspaceCreateBody {
  string name = 1;
  optional WorkspaceParameters parameters = 2;
  string workflow_alias = 3;
  optional ToolkitPolicy toolkit = 4;
  string collection = 5;
}

message WorkspacePutBody {
  optional WorkspaceParameters parameters = 4;
  optional ToolkitPolicy toolkit = 7;
}

message WorkspaceIconDownloadRequest {
  string name = 1;
  IconFormat format = 2;
}

message WorkspaceIconDownloadResponse {
  string name = 1;
  IconFormat format = 2;
  int64 size_bytes = 3;
}

message WorkspaceCreateRequest {
  WorkspaceCreateBody value = 1;
}

message WorkspaceCreateResponse {
  Workspace value = 1;
}

message WorkspaceDeleteRequest {
  string name = 1;
}

message WorkspaceDeleteResponse {
  Workspace value = 1;
}

message WorkspaceGetRequest {
  string name = 1;
}

message WorkspaceGetResponse {
  Workspace value = 1;
  string runtime_profile_name = 2;
  string runtime_profile_revision = 3;
}

message WorkspaceHistoryAudioGetRequest {
  string history_id = 1;
  string workspace_name = 2;
}

message WorkspaceHistoryAudioGetResponse {
  string history_id = 1;
  string mime_type = 2;
  int64 size_bytes = 3;
  string workspace_name = 4;
}

message WorkspaceHistoryGetRequest {
  string history_id = 1;
  string workspace_name = 2;
}

message WorkspaceHistoryGetResponse {
  PeerRunHistoryEntry value = 1;
}

message WorkspaceHistoryListRequest {
  optional string cursor = 1;
  optional int64 limit = 2;
  optional WorkspaceHistoryListRequestOrder order = 3;
  string workspace_name = 4;
}

message WorkspaceHistoryListResponse {
  PeerRunHistoryListResponse value = 1;
}

message WorkspaceListRequest {
  optional string cursor = 1;
  optional int64 limit = 2;
  optional string prefix = 3;
  string collection = 4;
}

message WorkspaceListResponse {
  bool has_next = 1;
  repeated Workspace items = 2;
  optional string next_cursor = 3;
  string runtime_profile_name = 4;
  string runtime_profile_revision = 5;
}

message WorkspaceParameters {
  reserved 5;
  reserved "pet_workspace_parameters";

  oneof value {
    FlowcraftWorkspaceParameters flowcraft_workspace_parameters = 1;
    DoubaoRealtimeWorkspaceParameters doubao_realtime_workspace_parameters = 2;
    ASTTranslateWorkspaceParameters asttranslate_workspace_parameters = 3;
    ChatRoomWorkspaceParameters chat_room_workspace_parameters = 4;
  }
}

message WorkspacePutRequest {
  WorkspacePutBody body = 1;
  string name = 2;
}

message WorkspacePutResponse {
  Workspace value = 1;
}
