listen: "127.0.0.1:9820"
cipher-mode: "chacha_poly"
admin-identity-key: "../admin-config-home/gizclaw/e2e-admin/identity.key"
storage:
  memory:
    kind: keyvalue
    memory: {}
  local-files:
    kind: objectstore
    fs:
      dir: data/objects
  agenthost-files:
    kind: objectstore
    fs:
      dir: data/agenthost
  acl-db:
    kind: sql
    sqlite:
      dir: data/acl.sqlite
  history-db:
    kind: sql
    sqlite:
      dir: data/history.sqlite
stores:
  peers:
    kind: keyvalue
    storage: memory
    prefix: peers
  credentials:
    kind: keyvalue
    storage: memory
    prefix: credentials
  firmwares:
    kind: keyvalue
    storage: memory
    prefix: firmwares
  firmware-assets:
    kind: objectstore
    storage: local-files
    prefix: firmwares
  agenthost:
    kind: objectstore
    storage: agenthost-files
  minimax-tenants:
    kind: keyvalue
    storage: memory
    prefix: minimax-tenants
  voices:
    kind: keyvalue
    storage: memory
    prefix: voices
  workspaces:
    kind: keyvalue
    storage: memory
    prefix: workspaces
  workflows:
    kind: keyvalue
    storage: memory
    prefix: workflows
  acl:
    kind: sql
    storage: acl-db
  history:
    kind: sql
    storage: history-db
  pet-species:
    kind: keyvalue
    storage: memory
    prefix: pet-species
  pet-species-assets:
    kind: objectstore
    storage: local-files
    prefix: pet-species
  badges:
    kind: keyvalue
    storage: memory
    prefix: badges
  badge-assets:
    kind: objectstore
    storage: local-files
    prefix: badges
  pets:
    kind: keyvalue
    storage: memory
    prefix: pets
  rewards:
    kind: keyvalue
    storage: memory
    prefix: rewards
  wallets:
    kind: sql
    storage: history-db
  contacts:
    kind: keyvalue
    storage: memory
    prefix: contacts
  friend-requests:
    kind: keyvalue
    storage: memory
    prefix: friend-requests
  friends:
    kind: keyvalue
    storage: memory
    prefix: friends
  friend-groups:
    kind: keyvalue
    storage: memory
    prefix: friend-groups
  friend-group-members:
    kind: keyvalue
    storage: memory
    prefix: friend-group-members
  friend-group-messages:
    kind: keyvalue
    storage: memory
    prefix: friend-group-messages
  friend-group-message-assets:
    kind: objectstore
    storage: local-files
    prefix: friend-group-messages
peers:
  store: peers
credentials:
  store: credentials
firmwares:
  store: firmwares
minimax:
  tenants-store: minimax-tenants
  voices-store: voices
  credentials-store: credentials
workspaces:
  store: workspaces
workflows:
  store: workflows
acl:
  store: acl
history:
  store: history
friends:
  friend_otp_ttl: 2s
friend_groups:
  message_default_ttl: 24h
  message_max_ttl: 7d
  message_cleanup_interval: 100ms
  message_max_audio_bytes: 67108864
system_tasks:
  reward_claim:
    generator: model/reward-claim
    cooldown: 1ms
  pet_action:
    generator: model/pet-action
